# Input: provide either text or text_file
text: null
text_file: examples/sample_input.txt

# TTS
voice: zh-CN-XiaoxiaoNeural
rate: "+0%"
volume: "+0%"
tts_start_offset: 1.0

# Output modes: portrait, landscape, or both
output_modes: portrait,landscape
portrait_size: 1080x1920
landscape_size: 1920x1080
fps: 30
tts_workers: 4
image_workers: 4
clip_workers: 2
work_dir: output

# Text card style
font_path: C:/Windows/Fonts/msyh.ttc
font_size: 72
min_font_size: 28
line_spacing: 1.25
text_margin_x: 80
text_margin_y: 60
bg_color: "#000000"
text_color: "#FFFFFF"

# Cover first-frame
theme_keyword: null
cover_enabled: true
cover_prefix_text: "今日主题"
cover_bg_color: "#000000"
cover_text_color: "#D00000"

# Overlay
overlay_image: ./image.jpg
overlay_dir: null
overlay_height_ratio: 0.35
overlay_box_width_ratio: 0.68
overlay_fit: cover
overlay_top_margin: 48
overlay_text_gap: 12

# BGM (optional)
bgm:
  enabled: true
  file: ./bgm.mp3
  volume: 0.18
  fade_in: 1.5
  fade_out: 1.5
  audio_bitrate: "192k"
