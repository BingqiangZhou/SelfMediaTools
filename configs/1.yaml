# Input: provide either text or text_file
text: "别等状态好了再开始，状态是做出来的。你能控制的只有今天的时间、注意力和行动：少抱怨一次，多推进一小步；少刷十分钟，多练一遍基本功。目标别写在心里，要写进日程、写进复盘。把欲望收一收，把执行提上来。你不需要被谁点燃，你要学会自己发电。"
text_file: null

# TTS
voice: zh-CN-YunjianNeural #zh-CN-YunyangNeural #zh-CN-XiaoxiaoNeural
rate: "+25%"
volume: "+0%"
tts_start_offset: 0.2

# Output modes: portrait, landscape, or both
output_modes: landscape
portrait_size: 1080x1920
landscape_size: 1920x1080
fps: 30
tts_workers: 4
clip_workers: 2
work_dir: output

# Text card style
font_path: C:/Windows/Fonts/msyh.ttc
font_size: 72
min_font_size: 28
line_spacing: 1.25
text_margin_x: 80
text_margin_y: 60
bg_color: "#000000"
text_color: "#FFFFFF"
text_colors:
  - "#FFFFFF"
  - "#FFD700"
  - "#00BFFF"
  - "#FF6347"
  - "#7CFC00"

# Text effects (cycling per sentence)
text_effects:
  - fadein
  - slide_left
  - slide_right
  - slide_top
  - slide_bottom
  - rotate
effect_duration: 0.5

# Text effects control
use_text_effects: false
random_color: false
random_effect: false

# Subtitle render mode
subtitle_render_mode: classic # classic | flip_big
flip_big_style: progressive   # progressive | sentence
flip_big_max_lines: 3

# Cover first-frame
theme_keyword: "即将起飞"
cover_enabled: true
cover_bg_color: "#000000"
cover_text_color: "#D00000"

# BGM (optional)
bgm:
  enabled: true
  file: E:/Projects/Works/SelfMediaTools/assets/bgm.mp3
  volume: 0.27
  fade_in: 0.3
  fade_out: 1
  audio_bitrate: "192k"
