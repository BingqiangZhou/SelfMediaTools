# Input: provide either text or text_file
text: "沉默不是软弱，是看透了游戏的规则。那些喜欢争辩的人，还在用情绪对抗现实。高手早就学会了用结果说话。把精力消耗在口舌之争上，是最愚蠢的投资。真正的认知升级，是把情绪抽离，只看事实和概率。与其说服别人，不如用行动碾压怀疑。"
text_file: null

# TTS
voice: zh-CN-YunjianNeural #zh-CN-YunyangNeural #zh-CN-XiaoxiaoNeural
rate: "+50%"
volume: "+50%"
tts_start_offset: 0.2

# Output modes: portrait, landscape, or both
output_modes: landscape
portrait_size: 1080x1920
landscape_size: 1920x1080
fps: 30
tts_workers: 4
clip_workers: 2
work_dir: output

# Text card style
font_path: C:/Windows/Fonts/msyh.ttc
font_size: 72
min_font_size: 28
line_spacing: 1.25
text_margin_x: 80
text_margin_y: 60
bg_color: "#000000"
text_color: "#FFFFFF"
text_colors:
  - "#FFFFFF"
  - "#FFD700"
  - "#00BFFF"
  - "#FF6347"
  - "#7CFC00"

# Text effects (cycling per sentence)
text_effects:
  - fadein
  - slide_left
  - slide_right
  - slide_top
  - slide_bottom
  - rotate
effect_duration: 0.5

# Text effects control
use_text_effects: false
random_color: false
random_effect: false
caption_style: lyrics #classic

# Cover first-frame
theme_keyword: "认知升级"
cover_enabled: true
cover_bg_color: "#000000"
cover_text_color: "#D00000"

# BGM (optional)
bgm:
  enabled: true
  file: E:/Projects/Works/SelfMediaTools/assets/bgm.mp3
  volume: 0.27
  fade_in: 0.3
  fade_out: 1
  audio_bitrate: "192k"
